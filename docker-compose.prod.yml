# =============================================================================
# Interdiscount API — Production Docker Compose
# =============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Notes:
#   - No source code volumes (image contains built code)
#   - No dev tools (mongo-express, redis-commander, mailpit)
#   - MongoDB with authentication enabled
#   - Healthchecks on all services
#   - Resource limits configured
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: interdiscount_api
    restart: unless-stopped
    ports:
      - '4010:4010'
    environment:
      - NODE_ENV=production
      - PORT=4010
      - MONGODB_URI=mongodb://interdiscount_user:${MONGO_PASSWORD}@mongo:27017/interdiscount?authSource=admin
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      - MAIL_FROM=${MAIL_FROM}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=100
      - DEFAULT_PAGE_SIZE=24
      - MAX_PAGE_SIZE=100
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:4010/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    networks:
      - interdiscount_network
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.interdiscount-api.rule=Host(`interdiscount-api.swiftapp.ch`)"
      - "traefik.http.routers.interdiscount-api.entrypoints=websecure"
      - "traefik.http.routers.interdiscount-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.interdiscount-api.loadbalancer.server.port=4010"

  mongo:
    image: mongo:7
    container_name: interdiscount_mongo
    restart: unless-stopped
    ports:
      - '27025:27017'
    volumes:
      - interdiscount_mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=interdiscount_user
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=interdiscount
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    networks:
      - interdiscount_network

  redis:
    image: redis:7-alpine
    container_name: interdiscount_redis
    restart: unless-stopped
    ports:
      - '6385:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - interdiscount_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - interdiscount_network

volumes:
  interdiscount_mongo_data:
  interdiscount_redis_data:

networks:
  interdiscount_network:
    driver: bridge
  traefik:
    external: true
